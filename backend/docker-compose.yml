name: task-service-nest

services:
  app:
    build:
      context: ..
      dockerfile: backend/docker/Dockerfile
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/app
      - REDIS_URL=redis://redis:6379
    volumes:
      - ..:/app
      - /app/node_modules
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    ports:
      - '6379:6379'
